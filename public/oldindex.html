<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tower Defense</title>
<style>
body {
    margin: 0;
    background: #1b1b1b;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    margin: 10px 0;
}

#ui {
    padding: 10px;
    background: #111;
    font-size: 18px;
}

#towerButtons {
    margin-top: 8px;
}

button {
    margin: 4px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button.selected {
    outline: 3px solid yellow;
}

canvas {
    background: #2c3e50;
    border: 2px solid white;
    display: block;
    margin: 0 auto;
    cursor: crosshair;
}
</style>
</head>
<body>
<h1>🏰 Tower Defense</h1>

<div id="ui">
    Gold: <span id="gold">150</span> |
    Lives: <span id="lives">20</span> |
    Wave: <span id="wave">1</span>

    <div id="towerButtons"></div>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gold = 150;
let lives = 20;
let wave = 1;
let firstBasicTowerPlaced = false;

const goldEl = document.getElementById("gold");
const livesEl = document.getElementById("lives");
const waveEl = document.getElementById("wave");
const towerButtons = document.getElementById("towerButtons");

const pathPoints = [
    { x: 0, y: 250 },
    { x: 150, y: 250 },
    { x: 150, y: 100 },
    { x: 450, y: 100 },
    { x: 450, y: 400 },
    { x: 750, y: 400 },
    { x: 750, y: 200 },
    { x: 900, y: 200 }
];

const towers = [];
const enemies = [];
const bullets = [];

/* =========================
   TOWER TYPES
========================= */
const towerTypes = [
    {
        name: "Blue Tower",
        color: "cyan",
        cost: 100,
        range: 130,
        fireRate: 30,
        damage: 15
    },
    {
        name: "Sniper",
        color: "lime",
        cost: 200,
        range: 260,
        fireRate: 90,
        damage: 80
    },
    {
        name: "Rapid",
        color: "orange",
        cost: 180,
        range: 100,
        fireRate: 8,
        damage: 6
    },
    {
        name: "Cannon",
        color: "red",
        cost: 300,
        range: 150,
        fireRate: 60,
        damage: 50
    },
    {
        name: "Mega",
        color: "purple",
        cost: 600,
        range: 220,
        fireRate: 20,
        damage: 40
    }
];

let selectedTowerType = towerTypes[0];

/* =========================
   ENEMY TYPES (PNG FILES)
   Put images in:
   public/png/
========================= */
const enemyTypes = [
    {
        name: "Slime",
        image: "png/slime.png",
        baseHp: 20,
        baseSpeed: 1.4,
        radius: 16,
        reward: 5
    },
    {
        name: "Goblin",
        image: "png/goblin.png",
        baseHp: 40,
        baseSpeed: 1.8,
        radius: 18,
        reward: 8
    },
    {
        name: "Wolf",
        image: "png/wolf.png",
        baseHp: 35,
        baseSpeed: 2.6,
        radius: 16,
        reward: 10
    },
    {
        name: "Orc",
        image: "png/orc.png",
        baseHp: 100,
        baseSpeed: 1.2,
        radius: 22,
        reward: 15
    },
    {
        name: "Troll",
        image: "png/troll.png",
        baseHp: 250,
        baseSpeed: 0.8,
        radius: 28,
        reward: 25
    },
    {
        name: "Dragon",
        image: "png/dragon.png",
        baseHp: 600,
        baseSpeed: 1.6,
        radius: 32,
        reward: 50
    }
];

// Preload images
for (const type of enemyTypes) {
    type.img = new Image();
    type.img.src = type.image;
}

function getEnemyType() {
    const maxIndex = Math.min(
        enemyTypes.length - 1,
        Math.floor((wave - 1) / 2) + 1
    );

    return enemyTypes[Math.floor(Math.random() * (maxIndex + 1))];
}

/* =========================
   CLASSES
========================= */
class Enemy {
    constructor() {
        const type = getEnemyType();

        this.name = type.name;
        this.img = type.img;
        this.radius = type.radius;
        this.reward = type.reward;

        const hpMultiplier = 1 + (wave - 1) * 0.25;
        const speedMultiplier = 1 + (wave - 1) * 0.03;

        this.hp = Math.floor(type.baseHp * hpMultiplier);
        this.maxHp = this.hp;
        this.speed = type.baseSpeed * speedMultiplier;

        this.x = pathPoints[0].x;
        this.y = pathPoints[0].y;
        this.pathIndex = 0;
    }

    update() {
        const target = pathPoints[this.pathIndex + 1];

        if (!target) {
            lives--;
            return false;
        }

        const dx = target.x - this.x;
        const dy = target.y - this.y;
        const dist = Math.hypot(dx, dy);

        if (dist < this.speed) {
            this.pathIndex++;
        } else {
            this.x += dx / dist * this.speed;
            this.y += dy / dist * this.speed;
        }

        return true;
    }

    draw() {
        if (this.img.complete && this.img.naturalWidth > 0) {
            ctx.drawImage(
                this.img,
                this.x - this.radius,
                this.y - this.radius,
                this.radius * 2,
                this.radius * 2
            );
        } else {
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // HP bar
        const width = this.radius * 2;
        ctx.fillStyle = "black";
        ctx.fillRect(this.x - width / 2, this.y - this.radius - 10, width, 5);

        ctx.fillStyle = "lime";
        ctx.fillRect(
            this.x - width / 2,
            this.y - this.radius - 10,
            width * (this.hp / this.maxHp),
            5
        );
    }
}

class Tower {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;

        this.range = type.range;
        this.fireRate = type.fireRate;
        this.damage = type.damage;
        this.color = type.color;
        this.cooldown = 0;
    }

    update() {
        if (this.cooldown > 0) this.cooldown--;

        let target = null;

        for (const enemy of enemies) {
            const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
            if (dist <= this.range) {
                target = enemy;
                break;
            }
        }

        if (target && this.cooldown <= 0) {
            bullets.push(new Bullet(this.x, this.y, target, this.damage));
            this.cooldown = this.fireRate;
        }
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 20, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Bullet {
    constructor(x, y, target, damage) {
        this.x = x;
        this.y = y;
        this.target = target;
        this.damage = damage;
        this.speed = 8;
    }

    update() {
        if (!enemies.includes(this.target)) return false;

        const dx = this.target.x - this.x;
        const dy = this.target.y - this.y;
        const dist = Math.hypot(dx, dy);

        if (dist < this.speed) {
            this.target.hp -= this.damage;
            return false;
        }

        this.x += dx / dist * this.speed;
        this.y += dy / dist * this.speed;
        return true;
    }

    draw() {
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fill();
    }
}

/* =========================
   TOWER BUTTONS
========================= */
function getTowerCost(type) {
    if (type.name === "Blue Tower" && !firstBasicTowerPlaced) return 0;
    return type.cost;
}

function renderTowerButtons() {
    towerButtons.innerHTML = "";

    for (const type of towerTypes) {
        const btn = document.createElement("button");
        const cost = getTowerCost(type);

        btn.textContent = `${type.name} (${cost})`;
        btn.style.background = type.color;

        if (selectedTowerType === type) {
            btn.classList.add("selected");
        }

        btn.onclick = () => {
            selectedTowerType = type;
            renderTowerButtons();
        };

        towerButtons.appendChild(btn);
    }
}

/* =========================
   PLACE TOWERS
========================= */
canvas.addEventListener("click", e => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const cost = getTowerCost(selectedTowerType);

    if (gold < cost) return;

    // prevent placing on path
    for (let i = 0; i < pathPoints.length - 1; i++) {
            const a = pathPoints[i];
            const b = pathPoints[i + 1];

            const minX = Math.min(a.x, b.x) - 30;
            const maxX = Math.max(a.x, b.x) + 30;
            const minY = Math.min(a.y, b.y) - 30;
            const maxY = Math.max(a.y, b.y) + 30;

            if (x >= minX && x <= maxX &&
                y >= minY && y <= maxY) {
                return;
            }
    }

    towers.push(new Tower(x, y, selectedTowerType));
    gold -= cost;

    if (selectedTowerType.name === "Blue Tower") {
        firstBasicTowerPlaced = true;
        renderTowerButtons();
    }
});

/* =========================
   GAME LOOP
========================= */
let spawnTimer = 0;
let enemiesToSpawn = 5;

function update() {
    spawnTimer++;

    if (spawnTimer >= 60 && enemiesToSpawn > 0) {
        enemies.push(new Enemy());
        enemiesToSpawn--;
        spawnTimer = 0;
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        if (!enemies[i].update()) {
            enemies.splice(i, 1);
            continue;
        }

        if (enemies[i].hp <= 0) {
            gold += enemies[i].reward;
            enemies.splice(i, 1);
        }
    }

    for (const tower of towers) tower.update();

    for (let i = bullets.length - 1; i >= 0; i--) {
        if (!bullets[i].update()) {
            bullets.splice(i, 1);
        }
    }

    if (enemiesToSpawn === 0 && enemies.length === 0) {
        wave++;
        enemiesToSpawn = 5 + wave * 3;
        gold += 50 + wave * 20;
    }

    if (lives <= 0) {
        alert("Game Over!");
        location.reload();
    }

    goldEl.textContent = gold;
    livesEl.textContent = lives;
    waveEl.textContent = wave;
}

function drawPath() {
    ctx.strokeStyle = "#c2b280";
    ctx.lineWidth = 40;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(pathPoints[0].x, pathPoints[0].y);

    for (const p of pathPoints) {
        ctx.lineTo(p.x, p.y);
    }

    ctx.stroke();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPath();

    for (const tower of towers) tower.draw();
    for (const enemy of enemies) enemy.draw();
    for (const bullet of bullets) bullet.draw();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

renderTowerButtons();
gameLoop();
</script>
</body>
</html>
