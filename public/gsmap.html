<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tower Defense - Summer Edition</title>

<style>
body {
    margin: 0;
    background: #0d1b11;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    overflow: hidden;
}

#ui-container {
    padding: 15px;
    background: rgba(0,0,0,0.8);
    border-bottom: 3px solid #27ae60;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 10;
}

.stats {
    display: flex;
    gap: 40px;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

.controls {
    display: flex;
    gap: 15px;
    align-items: center;
}

button {
    padding: 8px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}

.tower-btn { background: #444; color: white; }
.tower-btn.selected { border: 2px solid #f1c40f; }

#startBtn { background: #2ecc71; }
#sellBtn { background: #e74c3c; display:none; }

canvas {
    display: block;
    margin: 10px auto;
    background: #222;
    border: 5px solid #111;
    border-radius: 10px;
    cursor: crosshair;
}
</style>
</head>

<body>

<div id="ui-container">
    <div class="stats">
        <span>💰 <span id="gold">200</span></span>
        <span>❤️ <span id="lives">20</span></span>
        <span>🌊 Wave: <span id="wave">1</span></span>
    </div>

    <div class="controls">
        <div id="towerButtons"></div>
        <button id="startBtn">START WAVE</button>
        <button id="sellBtn">SELL</button>
        <label><input type="checkbox" id="autoStart"> Auto</label>
    </div>
</div>

<canvas id="game" width="1920" height="1080"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== IMAGES =====
const bgImg = new Image();
bgImg.src = "greensummer.png"; // make sure file exists

const slimeImg = new Image();
slimeImg.src = "slime.png";

// ===== GAME STATE =====
let gold = 200;
let lives = 20;
let wave = 1;
let waveActive = false;
let autoStart = false;
let selectedTypeIdx = 0;
let selectedPlacedTower = null;
let mousePos = {x:0,y:0};

const TILT = 0.85;
const Y_OFFSET = 50;

// ===== PROJECT =====
function project(x,y,z=0){
    return {
        px: x,
        py: (y*TILT)+Y_OFFSET-z
    };
}

// ===== PATH =====
const path = [
    {x:-50,y:540},{x:400,y:540},{x:400,y:200},
    {x:900,y:200},{x:900,y:900},{x:1400,y:900},
    {x:1400,y:400},{x:2000,y:400}
];

// ===== DRAW BACKGROUND + PATH =====
function drawScene(){

    // IMAGE BACKGROUND
    if(bgImg.complete && bgImg.naturalWidth > 0){
        ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);
        return; // IMPORTANT: no path on image
    }

    // FALLBACK BACKGROUND
    ctx.fillStyle = "#27ae60";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // DRAW PATH ONLY IF NO IMAGE
    ctx.lineWidth = 60;
    ctx.strokeStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    let start = project(path[0].x,path[0].y);
    ctx.moveTo(start.px,start.py);

    for(let p of path){
        let pt = project(p.x,p.y);
        ctx.lineTo(pt.px,pt.py);
    }
    ctx.stroke();

    ctx.lineWidth = 50;
    ctx.strokeStyle = "#8b6b2e";
    ctx.beginPath();
    ctx.moveTo(start.px,start.py);

    for(let p of path){
        let pt = project(p.x,p.y);
        ctx.lineTo(pt.px,pt.py);
    }
    ctx.stroke();
}

// ===== ENEMIES / TOWERS (minimal working) =====
let enemies=[];
let towers=[];
let bullets=[];

class Enemy{
    constructor(){
        this.x=path[0].x;
        this.y=path[0].y;
        this.i=0;
        this.hp=50+wave*10;
        this.speed=1+wave*0.1;
    }
    update(){
        let t=path[this.i+1];
        if(!t) return false;
        let dx=t.x-this.x;
        let dy=t.y-this.y;
        let d=Math.hypot(dx,dy);
        if(d<this.speed)this.i++;
        else{
            this.x+=dx/d*this.speed;
            this.y+=dy/d*this.speed;
        }
        return true;
    }
    draw(){
        let p=project(this.x,this.y);
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(p.px,p.py,15,0,Math.PI*2);
        ctx.fill();
    }
}

class Tower{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.cool=0;
    }
    update(){
        if(this.cool>0)this.cool--;
        let e=enemies[0];
        if(e && this.cool===0){
            bullets.push({x:this.x,y:this.y,tx:e});
            this.cool=30;
        }
    }
    draw(){
        let p=project(this.x,this.y);
        ctx.fillStyle="blue";
        ctx.fillRect(p.px-10,p.py-10,20,20);
    }
}

function update(){
    enemies=enemies.filter(e=>e.update());
    towers.forEach(t=>t.update());

    bullets=bullets.filter(b=>{
        let e=b.tx;
        let dx=e.x-b.x;
        let dy=e.y-b.y;
        let d=Math.hypot(dx,dy);
        if(d<10){
            e.hp-=10;
            if(e.hp<=0) enemies.splice(enemies.indexOf(e),1);
            return false;
        }
        b.x+=dx/d*6;
        b.y+=dy/d*6;
        return true;
    });

    document.getElementById("gold").innerText=gold;
    document.getElementById("lives").innerText=lives;
    document.getElementById("wave").innerText=wave;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawScene();

    enemies.forEach(e=>e.draw());
    towers.forEach(t=>t.draw());

    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        let p=project(b.x,b.y);
        ctx.beginPath();
        ctx.arc(p.px,p.py,5,0,Math.PI*2);
        ctx.fill();
    });
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

// ===== INPUT =====
canvas.onclick=(e)=>{
    const r=canvas.getBoundingClientRect();
    let x=e.clientX-r.left;
    let y=(e.clientY-r.top - Y_OFFSET)/TILT;
    towers.push(new Tower(x,y));
};

setInterval(()=>enemies.push(new Enemy()),2000);

</script>
</body>
</html>
