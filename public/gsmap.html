<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Defense - HD Edition</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; }
        #ui-container { padding: 10px; background: rgba(20, 20, 20, 0.95); border-bottom: 2px solid #27ae60; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 10; }
        .stats { display: flex; gap: 40px; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tower-btn { background: #444; color: white; border: 2px solid transparent; }
        .tower-btn.selected { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        #startBtn { background: #2ecc71; color: white; padding: 10px 20px; }
        #sellBtn { background: #e74c3c; color: white; display: none; }
        #canvas-wrapper { width: 100vw; height: calc(100vh - 120px); display: flex; justify-content: center; align-items: center; background: #111; }
        canvas { background: #000; max-width: 100%; max-height: 100%; border: 2px solid #333; cursor: crosshair; image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="stats">
        <span>💰 <span id="gold">200</span></span>
        <span>❤️ <span id="lives">20</span></span>
        <span>🌊 Wave: <span id="wave">1</span></span>
    </div>
    <div class="controls">
        <div id="towerButtons"></div>
        <button id="startBtn">START WAVE</button>
        <button id="sellBtn">SELL TOWER</button>
        <label><input type="checkbox" id="autoStart"> Auto-Start</label>
    </div>
</div>

<div id="canvas-wrapper">
    <canvas id="game" width="1920" height="1080"></canvas>
</div>

<script>
    /* ================= MAP CONFIGURATION ================= */
    // Change your track image here
    const MAP_IMAGE_SRC = 'png/greensummer.png';

    // Edit these points to match your 'greensummer.png' track!
    const path = [
        { x: -100, y: 540 }, 
        { x: 400, y: 540 }, 
        { x: 400, y: 200 },
        { x: 1200, y: 200 }, 
        { x: 1200, y: 800 }, 
        { x: 1600, y: 800 },
        { x: 1600, y: 400 }, 
        { x: 2020, y: 400 }
    ];
</script>

<script src="script.js"></script>

</body>
</html>
